name: rss-agg

services:
  nginx:
    image: nginx:1.29
    ports:
      - ${SERVING_PORT:-8080}:80
    volumes:
      - ./nginx/templates:/etc/nginx/templates
    environment:
      WEB_ROOT: ${APP_ROOT:-/app}/public
      FASTCGI_HOST: phpfpm
      FASTCGI_PORT: 9000
    depends_on:
      phpfpm:
        condition: service_started
        restart: true
    networks:
      - rss-agg-network
  phpfpm:
    image: php:8.4.18-fpm
    volumes:
      - ../:/${APP_ROOT:-/app}
    networks:
      - rss-agg-network
networks:
  rss-agg-network:
